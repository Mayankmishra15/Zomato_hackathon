version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONPATH=/app

  streamlit:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
